<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Jug Studios - Projects</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0f172a;
        color: #e5e7eb;
    }

    header {
        text-align: center;
        padding: 40px 20px;
        background: linear-gradient(135deg, #1e293b, #020617);
    }

    header h1 {
        margin: 15px 0 5px;
        font-size: 2.5em;
    }

    nav {
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: 15px;
        background-color: #020617;
        flex-wrap: wrap;
        align-items: center;
    }

    nav a, .lang-btn {
        font-weight: bold;
    }

    nav a {
        color: #38bdf8;
        text-decoration: none;
    }

    nav a:hover {
        text-decoration: underline;
    }

    .lang-btn {
        padding: 5px 10px;
        border: none;
        border-radius: 6px;
        background-color: #38bdf8;
        color: #020617;
        cursor: pointer;
    }

    .lang-btn:hover {
        background-color: #0ea5e9;
    }

    section {
        max-width: 900px;
        margin: auto;
        padding: 40px 20px;
    }

    .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 15px;
    }

    .card {
        background-color: #1e293b;
        padding: 15px;
        border-radius: 12px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .card img {
        max-width: 40%;
        border-radius: 8px;
    }

    .button {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 15px;
        background-color: #38bdf8;
        color: #020617;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
    }

    .button:hover {
        background-color: #0ea5e9;
    }

    footer {
        text-align: center;
        padding: 20px;
        background-color: #020617;
        color: #64748b;
    }

    .close-btn {
        position: fixed;
        top: 10px;
        right: 15px;
        padding: 5px 10px;
        background: #38bdf8;
        color: #020617;
        font-weight: bold;
        text-decoration: none;
        border-radius: 6px;
        z-index: 1000;
    }

    .close-btn:hover {
        background-color: #0ea5e9;
    }
</style>
</head>
<body>

<a href="https://glass-jug.github.io/Glass-Jug-Hub/" class="close-btn">X</a>

<header>
    <h1 id="projects-title">Projects</h1>
</header>

<nav>
    <button class="lang-btn" onclick="setLang('en')">English (UK)</button>
    <button class="lang-btn" onclick="setLang('cz')">Czech (Bohemia)</button>
    <button class="lang-btn" onclick="setLang('es')">Spanish (Spain)</button>
    <button class="lang-btn" onclick="setLang('ja')">Japanese (Japan)</button>
    <button class="lang-btn" onclick="setLang('pt-pt')">Portuguese (Portugal)</button>
    <button class="lang-btn" onclick="setLang('pt-br')">Portuguese (Brazil)</button>
</nav>

<section>
    <div class="projects-grid">
        <div class="card">
            <img src="https://via.placeholder.com/220x120.png?text=NAWD1" alt="NAWD1 cover">
            <p>NAWD1</p>
            <a class="button" href="#" target="_blank" id="btn-nawd1">Link</a>
        </div>
        <div class="card">
            <img src="NAWD2coverD.png" alt="NAWD2 cover">
            <p>1-2 Escapes Motověc in Brick Area (NAWD2)</p>
            <a class="button" href="#" target="_blank" id="btn-nawd2">Link</a>
        </div>
        <div class="card">
            <img src="NAWD3coverD.png" alt="NAWD3 cover">
            <p>NAWD3</p>
            <a class="button" href="#" target="_blank" id="btn-nawd3">Link</a>
        </div>
        <div class="card">
            <img src="SHcoverD.png" alt="Super Haste cover">
            <p>Super Haste</p>
            <a class="button" href="#" target="_blank" id="btn-superhaste">Link</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/220x120.png?text=1-2+Rich+Districts" alt="1-2 Rich Districts cover">
            <p>1-2 in Rich Districts</p>
            <a class="button" href="#" target="_blank" id="btn-richdistricts">Link</a>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Glass Jug Studios. All rights reserved.</p>
</footer>

<script>
const translations = {
    en: { projects: "Projects", btnLink: "Link" },
    cz: { projects: "Projekty", btnLink: "Odkaz" },
    es: { projects: "Proyectos", btnLink: "Enlace" },
    ja: { projects: "プロジェクト", btnLink: "リンク" },
    "pt-pt": { projects: "Projetos", btnLink: "Link" },
    "pt-br": { projects: "Projetos", btnLink: "Link" }
};

const covers = {
    nawd1: {
        en: "https://via.placeholder.com/220x120.png?text=NAWD1+EN",
        cz: "https://via.placeholder.com/220x120.png?text=NAWD1+CZ",
        ja: "https://via.placeholder.com/220x120.png?text=NAWD1+JP",
        es: "https://via.placeholder.com/220x120.png?text=NAWD1+SP"
    },
    nawd2: {
        en: "NAWD2coverD.png",
        cz: "NAWD2coverD.png",
        ja: "NAWD2coverD.png",
        es: "NAWD2coverD.png"
    },
    nawd3: {
        en: "NAWD3coverD.png",
        cz: "NAWD3coverD.png",
        ja: "NAWD3coverD.png",
        es: "NAWD3coverD.png"
    },
    superhaste: {
        en: "SHcoverD.png",
        cz: "SHcoverD.png",
        ja: "SHcoverJP.png",
        es: "SHcoverD.png"
    },
    richdistricts: {
        en: "https://via.placeholder.com/220x120.png?text=12RD+EN",
        cz: "https://via.placeholder.com/220x120.png?text=12RD+CZ",
        ja: "https://via.placeholder.com/220x120.png?text=12RD+JP",
        es: "https://via.placeholder.com/220x120.png?text=12RD+SP"
    }
};

function setLang(lang) {
    localStorage.setItem("lang", lang);

    document.getElementById("projects-title").innerText = translations[lang].projects;
    document.getElementById("btn-nawd1").innerText = translations[lang].btnLink;
    document.getElementById("btn-nawd2").innerText = translations[lang].btnLink;
    document.getElementById("btn-nawd3").innerText = translations[lang].btnLink;
    document.getElementById("btn-superhaste").innerText = translations[lang].btnLink;
    document.getElementById("btn-richdistricts").innerText = translations[lang].btnLink;

    // Update images safely
    document.querySelector('#btn-nawd1').closest('.card').querySelector('img').src = covers.nawd1[lang] || covers.nawd1.en;
    document.querySelector('#btn-nawd2').closest('.card').querySelector('img').src = covers.nawd2[lang] || covers.nawd2.en;
    document.querySelector('#btn-nawd3').closest('.card').querySelector('img').src = covers.nawd3[lang] || covers.nawd3.en;
    document.querySelector('#btn-superhaste').closest('.card').querySelector('img').src = covers.superhaste[lang] || covers.superhaste.en;
    document.querySelector('#btn-richdistricts').closest('.card').querySelector('img').src = covers.richdistricts[lang] || covers.richdistricts.en;
}

const savedLang = localStorage.getItem("lang") || "en";
setLang(savedLang);
</script>
HUGE WIP
</body>
</html>
