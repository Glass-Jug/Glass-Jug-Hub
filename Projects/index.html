<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Jug Studios - Projects</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #e5e7eb;
            position: relative;
        }

        /* Top-right X button */
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #38bdf8;
            color: #020617;
            font-weight: bold;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.2em;
            cursor: pointer;
            text-align: center;
            line-height: 36px;
            z-index: 1000;
            text-decoration: none;
        }

        .close-btn:hover {
            background-color: #0ea5e9;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1e293b, #020617);
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        section {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        #projects-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: #1e293b;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .card p {
            text-align: center;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .button {
            padding: 8px 12px;
            background-color: #38bdf8;
            color: #020617;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .button:hover {
            background-color: #0ea5e9;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #020617;
            color: #64748b;
        }
    </style>
</head>
<body>

<!-- Close button -->
<a href="https://glass-jug.github.io/Glass-Jug-Hub/" class="close-btn">X</a>

<header>
    <h1 id="projects-title">Projects</h1>
</header>

<nav>
    <a href="#about" id="nav-about">About</a>
    <a href="#news" id="nav-news">News</a>
    <a href="#links" id="nav-links">Links</a>

    <button class="lang-btn" onclick="setLang('en')">English (UK)</button>
    <button class="lang-btn" onclick="setLang('cz')">Czech (Bohemia)</button>
    <button class="lang-btn" onclick="setLang('es')">Spanish (Spain)</button>
    <button class="lang-btn" onclick="setLang('ja')">Japanese (Japan)</button>
    <button class="lang-btn" onclick="setLang('pt-pt')">Portuguese (Portugal)</button>
    <button class="lang-btn" onclick="setLang('pt-br')">Portuguese (Brazil)</button>
</nav>

<section>
    <div class="projects-grid">
        <div class="card">
            <img src="https://via.placeholder.com/220x120.png?text=NAWD1" alt="NAWD1 cover">
            <p>NAWD1</p>
            <a class="button" href="#" target="_blank" id="btn-nawd1">Link</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/220x120.png?text=NAWD2" alt="NAWD2 cover">
            <p>1-2 Escapes Motověc in Brick Area (NAWD2)</p>
            <a class="button" href="#" target="_blank" id="btn-nawd2">Link</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/220x120.png?text=NAWD3" alt="NAWD3 cover">
            <p>NAWD3</p>
            <a class="button" href="#" target="_blank" id="btn-nawd3">Link</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/220x120.png?text=Super+Haste" alt="Super Haste cover">
            <p>Super Haste</p>
            <a class="button" href="#" target="_blank" id="btn-superhaste">Link</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/220x120.png?text=1-2+Rich+Districts" alt="1-2 Rich Districts cover">
            <p>1-2 in Rich Districts</p>
            <a class="button" href="#" target="_blank" id="btn-richdistricts">Link</a>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Glass Jug Studios. All rights reserved.</p>
</footer>

<script>
const translations = {
    en: { projects: "Projects", btnLink: "Link" },
    cz: { projects: "Projekty", btnLink: "Odkaz" },
    es: { projects: "Proyectos", btnLink: "Enlace" },
    ja: { projects: "プロジェクト", btnLink: "リンク" },
    "pt-pt": { projects: "Projetos", btnLink: "Link" },
    "pt-br": { projects: "Projetos", btnLink: "Link" }
};

function setLang(lang) {
    localStorage.setItem("lang", lang);
    document.getElementById("projects-title").innerText = translations[lang].projects;
    document.getElementById("btn-nawd1").innerText = translations[lang].btnLink;
    document.getElementById("btn-nawd2").innerText = translations[lang].btnLink;
    document.getElementById("btn-nawd3").innerText = translations[lang].btnLink;
    document.getElementById("btn-superhaste").innerText = translations[lang].btnLink;
    document.getElementById("btn-richdistricts").innerText = translations[lang].btnLink;
}

const savedLang = localStorage.getItem("lang") || "en";
setLang(savedLang);
</script>

</body>
</html>
