<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Jug Studios – Contact</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #eee;

        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;

        overflow-x: hidden;
        overflow-y: auto;
    }

    /* Animated gradient background */
    body::before {
        content: "";
        position: fixed;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, #000814, #001d3d, #000000);
        background-size: 400% 400%;
        animation: gradientMove 15s ease infinite;
        z-index: -2;
    }

    @keyframes gradientMove {
        0% { transform: translate(0, 0); }
        50% { transform: translate(-25%, -25%); }
        100% { transform: translate(0, 0); }
    }

    /* Floating circles container */
    .circles {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: -1;
    }

    .circle {
        position: absolute;
        bottom: -60px;
        background: rgba(255, 215, 0, 0.8);
        border-radius: 50%;
        animation: floatUp linear forwards;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        100% {
            transform: translateY(-110vh) scale(0.3);
            opacity: 0;
        }
    }

    /* Content box */
    .container {
        position: relative;
        z-index: 1;
        background: rgba(20, 20, 20, 0.85);
        padding: 30px;
        border-radius: 12px;
        text-align: center;
        width: 320px;
        box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    h1 {
        margin-bottom: 20px;
    }

    a {
        display: block;
        margin: 10px 0;
        padding: 10px;
        border-radius: 8px;
        text-decoration: none;
        color: #fff;
        background: #333;
        transition: 0.2s;
    }

    a:hover {
        background: #555;
    }
</style>
</head>

<body>

<div class="circles"></div>

<div class="container">
    <h1>Glass Jug Studios</h1>
    <p>Contact us</p>

    <a href="https://discord.gg/DFcCRnFDEg" target="_blank">Join our Discord</a>
    <a href="mailto:glassjug.studio@gmail.com">glassjug.studio@gmail.com</a>
    <a href="https://matrix.to/#/#oGJc:matrix.org" target="_blank">Join on Matrix</a>
</div>

<script>
    const container = document.querySelector('.circles');

    function createCircle() {
        const circle = document.createElement('div');
        circle.classList.add('circle');

        const size = Math.random() * 40 + 10;
        circle.style.width = size + 'px';
        circle.style.height = size + 'px';
        circle.style.left = Math.random() * 100 + 'vw';

        const duration = Math.random() * 10 + 10;
        circle.style.animationDuration = duration + 's';

        container.appendChild(circle);

        setTimeout(() => {
            circle.remove();
        }, duration * 1000);
    }

    setInterval(createCircle, 500);
</script>

</body>
                
				
				
				
				                                                                                                                                                  
																																								  
																																								  
																																								  
																																								  
</html>
